name = "nba-mcp-ui"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "NbaMcpUiAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NbaMcpUiAgent"]

[observability]
enabled = true
